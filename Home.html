        // 1. Định nghĩa nội dung các trang dưới dạng HTML string
        const pages = {
            dashboard: `
                <div class="fade-in">
                    <h1>Tổng quan hệ thống</h1>
                    <div class="stats-grid">... (code 3 ô thống kê của bạn) ...</div>

            `,
            inventory: `
                <div class="fade-in">

                    <div class="card-table">... (code bảng dữ liệu) ...</div>
                </div>

            reports: `
                <div class="fade-in">
                    <h1>Báo cáo & Thống kê</h1>
                    <p>Biểu đồ doanh thu và nhập xuất hàng tháng.</p>
                </div>
            `
        };

        // 2. Hàm xử lý chuyển trang
        function changePage(pageId, element) {
            const displayArea = document.getElementById('main-display');
            
            // Tạo hiệu ứng chuyển cảnh mượt mà
            displayArea.style.opacity = 0;
            
            setTimeout(() => {
                // Thay đổi nội dung
                displayArea.innerHTML = pages[pageId];
                
                // Cập nhật trạng thái Active trên Sidebar
                document.querySelectorAll('.nav-item').forEach(item => {
                    item.classList.remove('active');
                });
                element.classList.add('active');
                
                // Hiện nội dung lên lại
                displayArea.style.opacity = 1;
            }, 200);
        }

        // 3. Tự động load trang Dashboard khi vừa mở web
        window.onload = () => {
            const defaultItem = document.querySelector('.nav-item');
            changePage('dashboard', defaultItem);
        };
    </script>
